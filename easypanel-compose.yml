version: "3.8"

services:
  retentio-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: retentio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: retentio
    volumes:
      - pgdata:/var/lib/postgresql/data

  retentio-redis:
    image: redis:7-alpine
    restart: unless-stopped

  retentio-api:
    build:
      context: https://github.com/syscoin-space/DISCOVERY-SDR.git#main:retentio-api
    restart: unless-stopped
    depends_on:
      - retentio-db
      - retentio-redis
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://retentio:${POSTGRES_PASSWORD}@retentio-db:5432/retentio
      REDIS_URL: redis://retentio-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_IV: ${ENCRYPTION_IV}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "1000"
      LOG_LEVEL: info

  retentio-web:
    build:
      context: https://github.com/syscoin-space/DISCOVERY-SDR.git#main:retentio-web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - retentio-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  pgdata:
